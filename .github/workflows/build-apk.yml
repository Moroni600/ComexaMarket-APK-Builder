name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Capacitor
        run: npm install -g @capacitor/core @capacitor/cli @capacitor/android
      
      - name: Create Capacitor project
        run: |
          npx cap init ComexaMarket com.comexamarket.app --web-dir=www
          npx cap add android
      
      - name: Sync and build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ComexaMarket-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
